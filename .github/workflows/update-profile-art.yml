name: Update profile art

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  update-art:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Fetch contributions
        run: |
          python scripts/fetch_contributions.py
        env:
          GH_PROFILE_USER: ${{ github.repository_owner }}

      - name: Render heatmap SVG
        run: |
          python scripts/render_heatmap_svg.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "Update contribution graph"
          git push
